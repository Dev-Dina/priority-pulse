name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Lint (ruff)
        run: uvx ruff check backend

      - name: Test (pytest)
        run: uv run --with pytest python -m pytest backend/tests -q
